  <rect x="102" y="300" width="148" height="40" rx="20" fill="#0EA5E9" fill-opacity="0.16" stroke="#38BDF8" stroke-opacity="0.28"/>
  <rect x="266" y="300" width="132" height="40" rx="20" fill="#06B6D4" fill-opacity="0.14" stroke="#67E8F9" stroke-opacity="0.22"/>
  <rect x="414" y="300" width="170" height="40" rx="20" fill="#0F172A" fill-opacity="0.28" stroke="#38BDF8" stroke-opacity="0.18"/>
